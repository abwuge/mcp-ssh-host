[server]
name = "mcp-target-ops"
default_target = "ssh:dev"
terminal_ring_buffer_bytes = 524288
runtime_dir = "/tmp/mcp-target-ops"
# Optional HTTP bearer auth. You can also set MCP_TARGET_OPS_HTTP_TOKEN
# instead of storing a token here. This is the recommended authentication mode
# for a private GPTs Action.
# http_bearer_token = "change-me"
#
# Public HTTPS origin used by OAuth metadata and by the generated GPTs OpenAPI
# Schema. Set this for GPTs even when OAuth is disabled, or use
# MCP_TARGET_OPS_PUBLIC_BASE_URL.
# public_base_url = "https://mcp.example.com"
#
# Optional OAuth support for remote HTTP MCP / ChatGPT Apps.
# oauth_enabled = true
# oauth_scopes = ["mcp:tools"]
# oauth_authorization_password = "change-me"
# oauth_allow_dynamic_client_registration = true
# oauth_authorization_code_ttl_secs = 600
# oauth_access_token_ttl_secs = 3600
# oauth_refresh_token_ttl_secs = 2592000

# Local host is intentionally disabled by default. Enable only for trusted setups.
[targets.local]
kind = "local"
enabled = false
shell = "bash"

[targets.local.policy]
allow_exec = false
allow_terminal = false
allow_file_read = false
allow_file_write = false
allow_select_active = false
require_explicit_target_for_write = true
allowed_roots = ["/tmp"]

# Example SSH target. External target id is "ssh:dev".
[targets.dev]
kind = "ssh"
enabled = true
host = "dev.example.com"
port = 22
user = "ubuntu"
# identity_file = "/Users/you/.ssh/id_ed25519"
extra_args = ["-o", "BatchMode=yes"]
shell = "bash"

[targets.dev.policy]
allow_exec = true
allow_terminal = true
allow_file_read = true
allow_file_write = true
allow_select_active = true
require_explicit_target_for_write = true
allowed_roots = ["/home/ubuntu/app", "/tmp"]
default_timeout_ms = 30000
max_output_bytes = 200000

# Example prod target with safer defaults.
[targets.prod]
kind = "ssh"
enabled = true
host = "prod.example.com"
port = 22
user = "ubuntu"
extra_args = ["-o", "BatchMode=yes"]

[targets.prod.policy]
allow_exec = true
allow_terminal = false
allow_file_read = true
allow_file_write = false
allow_select_active = false
require_explicit_target_for_write = true
allowed_roots = ["/srv/app", "/var/log"]
default_timeout_ms = 30000
max_output_bytes = 200000
